<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - E-store</title>
    <style>
        body {
            background: #f1f3f6;
            font-family: Arial, sans-serif;
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2874f0;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #1a5bc4;
        }
        .contact-container {
            width: 400px;
            margin: 60px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 32px 24px;
        }
        .contact-title {
            color: #2874f0;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 24px;
            text-align: center;
        }
        .contact-input, .contact-textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
        }
        .contact-btn {
            width: 100%;
            padding: 10px;
            background: #fb641b;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .contact-btn:hover {
            background: #f57224;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="contact-container">
        <div class="contact-title">Contact Us</div>
        <form>
            <input type="text" class="contact-input" placeholder="Your Name" required>
            <input type="email" class="contact-input" placeholder="Your Email" required>
            <textarea class="contact-textarea" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit" class="contact-btn">Send Message</button>
        </form>
    </div>
</body>
</html>
