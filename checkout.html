<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - E-Store</title>
    <style>
        body {
            background: #f1f3f6;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #2874f0;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #1a5bc4;
        }
        .cart-container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 32px 24px;
        }
        .cart-title {
            color: #2874f0;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 24px;
            text-align: center;
        }
        .cart-item {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 16px 0;
        }
        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin-right: 24px;
            border-radius: 4px;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .cart-item-price {
            color: #fb641b;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .quantity-btn {
            background: #f0f0f0;
            border: 1px solid #ddd;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quantity-btn:hover {
            background: #e0e0e0;
        }
        .quantity-display {
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }
        .remove-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .remove-btn:hover {
            background: #cc0000;
        }
        .cart-summary {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .cart-total {
            text-align: right;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .checkout-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #fb641b;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .checkout-btn:hover {
            background: #f57224;
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 18px;
        }
        .empty-cart a {
            color: #2874f0;
            text-decoration: none;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
        }
        .success {
            background: #00C851;
        }
        .error {
            background: #ff4444;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">←</button>
    <div class="cart-container">
        <div class="cart-title">My Cart</div>
        <div class="loading" id="loading">Loading cart...</div>
        <div id="cartContent"></div>
        <div class="cart-summary" id="cartSummary" style="display: none;">
            <div class="cart-total" id="cartTotal">Total: ₹0</div>
            <button class="checkout-btn" onclick="proceedToCheckout()">Proceed to Checkout</button>
        </div>
    </div>

    <div class="notification" id="notification"></div>
<script>
    let cartItems = [];

    async function loadCart() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        try {
            const response = await fetch('http://localhost:3000/api/cart', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.ok) {
                const data = await response.json();
                cartItems = data.items || [];
                displayCart(data);
            } else {
                showEmptyCart();
            }
        } catch (error) {
            showEmptyCart();
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function displayCart(cartData) {
        const content = document.getElementById('cartContent');
        const summary = document.getElementById('cartSummary');

        if (!cartData.items || cartData.items.length === 0) {
            showEmptyCart();
            return;
        }

        content.innerHTML = cartData.items.map(item => {
            const product = item.productId || {};
            return '<div class="cart-item">' +
                '<img src="' + (product.image || 'https://via.placeholder.com/100x100/f1f3f6/2874f0?text=Product') + '" alt="' + (product.name || 'Product') + '">' +
                '<div class="cart-item-details">' +
                    '<div class="cart-item-title">' + (product.name || 'Unknown Product') + '</div>' +
                    '<div class="cart-item-price">₹' + (product.price || 0).toLocaleString('en-IN') + '</div>' +
                    '<div class="quantity-controls">' +
                        '<span class="quantity-display">Qty: ' + item.quantity + '</span>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }).join('');

        summary.style.display = 'block';
        document.getElementById('cartTotal').textContent = 'Total: ₹' + (cartData.total || 0).toLocaleString('en-IN');
    }

    function showEmptyCart() {
        const content = document.getElementById('cartContent');
        const summary = document.getElementById('cartSummary');
        content.innerHTML = '<div class="empty-cart"><p>Your cart is empty!</p><p><a href="index.html">Continue Shopping</a></p></div>';
        summary.style.display = 'none';
    }

    function proceedToCheckout() {
        showNotification('Order placed successfully!', 'success');
        setTimeout(() => window.location.href = 'index.html', 2000);
    }

    function showNotification(message, type) {
        const notification = document.getElementById('notification');
        notification.textContent = message;
        notification.className = 'notification ' + type;
        notification.style.display = 'block';
        setTimeout(() => notification.style.display = 'none', 3000);
    }

    loadCart();
</script>
</body>
</html>
